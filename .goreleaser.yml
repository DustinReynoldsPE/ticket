version: 2

builds:
  - binary: tk
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/EnderRealm/ticket/cmd.Version={{.Version}}

archives:
  - formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  use: github-native

brews:
  - repository:
      owner: EnderRealm
      name: homebrew-tools
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    name: ticket
    homepage: "https://github.com/DustinReynoldsPE/ticket"
    description: "Markdown-based ticket management CLI"
    install: |
      bin.install "tk"
