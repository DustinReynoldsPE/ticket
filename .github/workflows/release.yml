name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}

      - name: Update AUR package
        env:
          AUR_SSH_KEY: ${{ secrets.AUR_SSH_KEY }}
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          PKGVER=${VERSION#v}

          # Get the linux amd64 tarball checksum from GoReleaser output
          SHA=$(grep "ticket_${PKGVER}_linux_amd64.tar.gz" dist/checksums.txt | cut -d' ' -f1)

          mkdir -p ~/.ssh
          echo "$AUR_SSH_KEY" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          echo "Host aur.archlinux.org" >> ~/.ssh/config
          echo "  IdentityFile ~/.ssh/aur" >> ~/.ssh/config
          echo "  User aur" >> ~/.ssh/config
          ssh-keyscan aur.archlinux.org >> ~/.ssh/known_hosts

          git clone ssh://aur@aur.archlinux.org/ticket.git aur
          cd aur

          sed -e "s|PKGVER_PLACEHOLDER|${PKGVER}|g" \
              -e "s|SHA_PLACEHOLDER|${SHA}|g" \
              $GITHUB_WORKSPACE/pkg/aur/PKGBUILD.template > PKGBUILD

          docker run --rm -v "$PWD:/pkg" archlinux:latest bash -c \
            "pacman -Sy --noconfirm pacman-contrib sudo && \
             useradd -u 1001 builder && chown -R builder /pkg && \
             cd /pkg && sudo -u builder makepkg --printsrcinfo > .SRCINFO && \
             chown -R 1001:1001 /pkg"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add PKGBUILD .SRCINFO
          git commit -m "Update to ${VERSION}"
          git push
